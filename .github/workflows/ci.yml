name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,eval]"

      # Advisory for now: the v0.19 source predates linting (~6k ruff findings,
      # mostly import-order / unused-import in legacy modules). Reported but not
      # blocking until a one-time `ruff check . --fix` cleanup lands. Tests are
      # the real gate.
      - name: Lint (advisory)
        continue-on-error: true
        run: ruff check .

      - name: Test
        run: pytest -q
